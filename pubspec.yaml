name: shopease
description: Full-featured E-Commerce App with Firebase & Razorpay
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0

  # State management
  provider: ^6.1.2

  # Payments
  razorpay_flutter: ^1.3.6

  # UI
  cached_network_image: ^3.4.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  google_fonts: ^6.2.1

  # Utils
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  uuid: ^4.4.0
  fluttertoast: ^8.2.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/